<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>TomDev | Card</title>
</head>
<body>
    <main class="card-container">
        <div class="card-content">
            <div class="card-header">
                <img class="card-avatar" src="assets/images/avatar.jfif" alt="Avatar TomDev">
            </div>

            <div class="card-body">
                <div class="card-body-text">
                    <h1 class="card-name">TomDev</h1>
                    <p class="card-desc">A <span>Developper</span> with 2 years of experience</p>
                </div>

                <div class="card-stack">
                    <div class="stack-item"><i class="devicon-javascript-plain colored"></i> JS</div>
                    <div class="stack-item"><i class="devicon-html5-plain colored"></i> HTML5</div>
                    <div class="stack-item"><i class="devicon-css3-plain colored"></i> CSS3</div>
                </div>
            </div>

            <div class="separator"></div>

            <div class="card-footer">
                <div class="card-link">
                    <a href="#" class="btn btn-outline"><i class="devicon-github-original"></i> Github</a>
                    <a href="#" class="btn btn-outline"><i class="devicon-linkedin-plain"></i> Linkedin</a>
                </div>

                <div class="card-actions">
                    <button class="btn"><i class="bi bi-person-fill-add"></i> Follow</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
